upstream frontend_app {
  server frontend:3000;
}

upstream backend_api {
  server backend:4000;
}

upstream srs_hls {
  server srs:8080;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://backend_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /_hls_auth {
    internal;
    proxy_pass http://backend_api/api/stream/authorize$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
  }

  location /hls/ {
    auth_request /_hls_auth;
    rewrite ^/hls/(.*)$ /$1 break;
    proxy_pass http://srs_hls;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control no-cache;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Headers *;

    # TODO: Safari native HLS supports URL loading differently than hls.js xhrSetup.
    # TODO: For full multi-platform support, move from query-token MVP to signed cookies or auth_request + session cookies.
  }

  location ~ ^/live/.+\.(m3u8|ts)$ {
    proxy_pass http://srs_hls;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Cache-Control no-cache;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Headers *;

    # SRS may emit follow-up HLS URLs under /live/... with hls_ctx query params.
    # TODO: Replace this compatibility path with signed cookies so follow-up playlist
    # and segment requests remain protected without exposing unauthenticated /live URLs.
  }

  location / {
    proxy_pass http://frontend_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
