listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
  enabled on;
  listen 8080;
  dir ./objs/nginx/html;
}

vhost __defaultVhost__ {
  tcp_nodelay on;

  hls {
    enabled on;
    hls_path ./objs/nginx/html;
    hls_fragment 2;
    hls_window 12;
    hls_cleanup on;
    hls_entry_prefix /hls/live;
  }

  http_remux {
    enabled on;
    mount [vhost]/[app]/[stream].flv;
  }

  # OBS -> rtmp://<host>:1935/live/<stream>
  # HLS direct -> http://<host>:8081/live/<stream>.m3u8
  # HLS protected -> http://<host>:8080/hls/live/<stream>.m3u8?playbackToken=...
  # Playlist entries should point to /hls/live so subsequent manifest/segment requests also pass nginx auth.
  # TODO: ?댁쁺 ?쒖뿉??on_publish / on_play hook?먯꽌 ?좏겙 ?먮뒗 ?쒕챸 寃利앹쓣 ?곸슜?댁빞 ??
  http_hooks {
    enabled on;
    on_publish http://backend:4000/api/stream/hooks/publish;
    on_play http://backend:4000/api/stream/hooks/play;
    on_stop http://backend:4000/api/stream/hooks/stop;
  }
}

